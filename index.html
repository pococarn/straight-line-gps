<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Lanteri GPS">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<title>Lanteri GPS Guidance</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}html,body{margin:0;width:100%;height:100%;overflow:hidden;background:#000;color:#fff;font-family:Arial,Helvetica,sans-serif;touch-action:manipulation}body{position:fixed;inset:0}.app{position:fixed;inset:0;display:grid;grid-template-rows:13.2% 10.4% 40.6% 14.2% 16.2%;gap:clamp(4px,.8vmin,8px);padding:calc(5px + env(safe-area-inset-top)) calc(6px + env(safe-area-inset-right)) calc(5px + env(safe-area-inset-bottom)) calc(6px + env(safe-area-inset-left));overflow:hidden}.panel{background:linear-gradient(145deg,#050505,#111);border:2px solid #303030;border-radius:clamp(7px,1.5vmin,15px);box-shadow:inset 0 0 18px rgba(255,255,255,.03);position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;min-width:0;min-height:0}.top{display:grid;grid-template-columns:27% 43% 30%;gap:inherit}.label{font-weight:1000;color:#eee;text-transform:uppercase;text-shadow:0 2px 2px #000;letter-spacing:.02em;font-size:clamp(12px,2.6vmin,24px);line-height:1;text-align:center}.value{font-weight:1000;text-shadow:0 2px 2px #000;line-height:.9;white-space:nowrap}.gpsState{color:#ff2b2b;font-size:clamp(30px,6.3vmin,62px)}.gpsPanel{flex-direction:column}.speedPanel .speedValue{font-size:clamp(52px,10vmin,96px)}.speedPanel .unit{position:absolute;right:5%;top:50%;transform:translateY(-50%);color:#ffe000;font-weight:1000;font-size:clamp(15px,3vmin,30px);text-shadow:0 2px 2px #000}.signalPanel{flex-direction:column;gap:4px}.bars{height:38%;display:flex;align-items:flex-end;gap:clamp(4px,.9vmin,9px)}.sigbar{width:clamp(16px,3vmin,28px);border-radius:3px;background:#444}.sigbar:nth-child(1){height:28%}.sigbar:nth-child(2){height:47%}.sigbar:nth-child(3){height:68%}.sigbar:nth-child(4){height:92%}.sigbar.on{background:#19ff19;box-shadow:0 0 10px #19ff19}.fix{font-size:clamp(12px,2.4vmin,24px);font-weight:1000;color:#ff2929}.ledRow{display:grid;grid-template-columns:repeat(13,1fr);align-items:center;gap:clamp(5px,1.2vmin,13px);padding:0 clamp(28px,8vw,130px)}.led{aspect-ratio:1;width:min(100%,8.4vmin);justify-self:center;border:clamp(3px,.75vmin,6px) solid #555;border-radius:50%;background:#171717}.led.active{background:#fff;border-color:#fff;box-shadow:0 0 22px #fff}.middle{display:grid;grid-template-columns:27% 43% 30%;grid-template-rows:38% 62%;gap:inherit}.metric{flex-direction:column}.metric .value{font-size:clamp(34px,7vmin,67px)}.width{grid-column:1;grid-row:1}.logo{grid-column:1;grid-row:2}.swath{grid-column:3;grid-row:1}.info{grid-column:3;grid-row:2;flex-direction:column;padding:6px;text-align:center}.infoMain{color:#ffd400;font-size:clamp(15px,3vmin,30px);font-weight:1000;text-shadow:0 2px 2px #000}.infoSub{font-size:clamp(11px,2.4vmin,22px);font-weight:900;color:#fff;line-height:1.25;margin-top:5px}.compass{grid-column:2;grid-row:1/3;flex-direction:column;justify-content:space-evenly;padding:3px}.direction{font-size:clamp(36px,7.4vmin,72px);font-weight:1000;color:#fff;text-shadow:0 2px 2px #000;line-height:.86}.arrow{width:0;height:0;border-left:min(6vmin,56px) solid transparent;border-right:min(6vmin,56px) solid transparent;border-bottom:min(14vmin,125px) solid #fff;filter:drop-shadow(0 0 18px #fff);transform:rotate(var(--rot,0deg));transform-origin:50% 62%}.move{font-size:clamp(34px,7vmin,68px);font-weight:1000;text-shadow:0 2px 2px #000;line-height:.85}.latlon{font-size:clamp(10px,2vmin,18px);font-weight:900;color:#999}.brand{color:#ffd400;text-align:center;font-weight:1000;line-height:.82}.brand .mark{font-size:clamp(58px,12vmin,115px);letter-spacing:-8px}.brand .name{font-size:clamp(17px,3.1vmin,31px);letter-spacing:1px}.brand small{display:block;font-size:clamp(9px,1.7vmin,15px);letter-spacing:3px}.buttons{display:grid;grid-template-columns:1.25fr 1.2fr 1fr 1fr .9fr;gap:inherit}.btn{border:0;border-radius:clamp(7px,1.5vmin,13px);font-size:clamp(20px,4.2vmin,40px);font-weight:1000;text-shadow:0 2px 2px #000;color:#fff;min-width:0;overflow:hidden}.start{background:linear-gradient(#00d200,#008b00)}.stop{background:linear-gradient(#ff2b2b,#940000)}.yellow{background:linear-gradient(#ffe65c,#ffd000);color:#000;text-shadow:0 1px 1px rgba(255,255,255,.25)}.grey{background:linear-gradient(#777,#272727)}.menuRow{display:none;grid-template-columns:repeat(6,1fr);gap:inherit;border-top:2px solid #333;padding-top:clamp(4px,.9vmin,8px)}.app.menuOpen{grid-template-rows:12.8% 9.8% 39% 13.4% 17.8%}.app.menuOpen .menuRow{display:grid}.menuSmall{background:linear-gradient(#303030,#111);border:2px solid #444;border-radius:clamp(6px,1.2vmin,12px);color:#fff;font-weight:1000;font-size:clamp(11px,2vmin,20px);text-shadow:0 2px 2px #000;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:4px}.menuSmall b{font-size:clamp(24px,4.8vmin,44px);line-height:.8;color:#ffd400}.close b{color:#ff3030}@media(max-height:430px){.app{grid-template-rows:13% 10% 40% 14% 0%;gap:4px}.app.menuOpen{grid-template-rows:12% 9% 37% 13% 20%}.brand .mark{font-size:10vmin}.direction{font-size:6vmin}.move{font-size:5.8vmin}.arrow{border-left-width:4.7vmin;border-right-width:4.7vmin;border-bottom-width:11vmin}.btn{font-size:3.4vmin}.speedPanel .speedValue{font-size:8.5vmin}.metric .value{font-size:5.9vmin}}@media(orientation:portrait){.app:before{content:'Rotate to landscape';position:fixed;inset:0;z-index:99;background:#000;color:#ffd400;display:flex;align-items:center;justify-content:center;font-size:32px;font-weight:1000}}
</style>
</head><body>
<div id="app" class="app">
  <div class="top">
    <div class="panel gpsPanel"><div class="label">GPS STATUS</div><div id="gpsState" class="value gpsState">OFF</div></div>
    <div class="panel speedPanel"><div id="speedVal" class="value speedValue">0</div><div class="unit">KM/H</div></div>
    <div class="panel signalPanel"><div class="label">GPS SIGNAL</div><div class="bars"><i class="sigbar" id="s1"></i><i class="sigbar" id="s2"></i><i class="sigbar" id="s3"></i><i class="sigbar" id="s4"></i></div><div id="fixText" class="fix">NO FIX</div></div>
  </div>
  <div class="panel ledRow" id="coverage"></div>
  <div class="middle">
    <div class="panel metric width"><div class="label">WIDTH</div><div id="widthVal" class="value">8.0m</div></div>
    <div class="panel logo"><div class="brand"><div class="mark">LE</div><div class="name">LANTERI</div><small>ENTERPRISES</small><small>ESTABLISHED 2014</small></div></div>
    <div class="panel compass"><div id="direction" class="direction">NO GPS</div><div class="arrow" id="arrow"></div><div id="moveState" class="move">STOPPED</div><div id="latlon" class="latlon">Lat/Lon: --</div></div>
    <div class="panel metric swath"><div class="label">SWATH</div><div id="swathVal" class="value">0</div></div>
    <div class="panel info"><div id="infoMain" class="infoMain">Waiting for GPS</div><div id="infoSub" class="infoSub">Add to Home Screen<br>for best experience</div></div>
  </div>
  <div class="buttons"><button id="startBtn" class="btn start">START GPS</button><button id="stopBtn" class="btn stop">STOP GPS</button><button id="setA" class="btn yellow">SET A</button><button id="setB" class="btn yellow">SET B</button><button id="menuBtn" class="btn grey">MENU</button></div>
  <div id="menuRow" class="menuRow"><button class="menuSmall" id="centerBtn"><b>◎</b>CENTER<br>OFFSET</button><button class="menuSmall" id="lineBtn"><b>∿</b>STRAIGHT<br>LINE</button><button class="menuSmall" id="settingsBtn"><b>⚙</b>SETTINGS</button><button class="menuSmall" id="saveBtn"><b>⌖</b>SAVE<br>POINT</button><button class="menuSmall" id="viewBtn"><b>▤</b>VIEW<br>POINTS</button><button class="menuSmall close" id="closeBtn"><b>✕</b>CLOSE</button></div>
</div>
<script>
const $=id=>document.getElementById(id);let watch=null,wake=null,last=null,A=null,B=null,width=8,heading=0;const leds=$('coverage');for(let i=0;i<13;i++){let d=document.createElement('div');d.className='led';leds.appendChild(d)}
function sig(acc){let n=0;if(acc<8)n=4;else if(acc<18)n=3;else if(acc<40)n=2;else if(acc<90)n=1;for(let i=1;i<=4;i++)$('s'+i).classList.toggle('on',i<=n);$('fixText').textContent=n?'FIX':'NO FIX';$('fixText').style.color=n?'#19ff19':'#ff2929'}
function dir(d){return ['NORTH','N/E','EAST','S/E','SOUTH','S/W','WEST','N/W'][Math.round((((d%360)+360)%360)/45)%8]}
function led(off){[...leds.children].forEach(x=>x.className='led');leds.children[6].classList.add('active');if(isFinite(off)){let p=Math.max(0,Math.min(12,Math.round(6+off/(width/2))));leds.children[p].classList.add('active')}}
function dist(p,a,b){if(!a||!b)return NaN;const R=6371000,rad=x=>x*Math.PI/180,lat0=rad((a.lat+b.lat+p.lat)/3),x1=rad(a.lon)*Math.cos(lat0)*R,y1=rad(a.lat)*R,x2=rad(b.lon)*Math.cos(lat0)*R,y2=rad(b.lat)*R,x0=rad(p.lon)*Math.cos(lat0)*R,y0=rad(p.lat)*R,dx=x2-x1,dy=y2-y1,l=Math.hypot(dx,dy)||1;return ((x0-x1)*dy-(y0-y1)*dx)/l}
async function awake(){try{if('wakeLock'in navigator)wake=await navigator.wakeLock.request('screen')}catch(e){}}
function stopGPS(){if(watch!==null){navigator.geolocation.clearWatch(watch);watch=null}try{wake&&wake.release()}catch(e){}wake=null;$('gpsState').textContent='OFF';$('gpsState').style.color='#ff2b2b';$('speedVal').textContent='0';$('direction').textContent='NO GPS';$('moveState').textContent='STOPPED';$('latlon').textContent='Lat/Lon: --';$('infoMain').textContent='Waiting for GPS';$('infoSub').innerHTML='Add to Home Screen<br>for best experience';sig(999);led(NaN)}
function startGPS(){if(!navigator.geolocation){alert('GPS not supported');return}if(watch!==null)return;$('gpsState').textContent='ON';$('gpsState').style.color='#19ff19';awake();watch=navigator.geolocation.watchPosition(pos=>{let c=pos.coords,spd=Math.max(0,(c.speed||0)*3.6);if(last&&(!c.heading||c.heading<0)&&spd>1){let dy=c.latitude-last.lat,dx=(c.longitude-last.lon)*Math.cos(c.latitude*Math.PI/180);heading=(Math.atan2(dx,dy)*180/Math.PI+360)%360}else if(c.heading>=0)heading=c.heading;last={lat:c.latitude,lon:c.longitude};$('speedVal').textContent=Math.round(spd);$('direction').textContent=dir(heading);$('arrow').style.setProperty('--rot',heading+'deg');$('moveState').textContent=spd>1?'MOVING':'STOPPED';$('latlon').textContent=`Lat/Lon: ${c.latitude.toFixed(5)}, ${c.longitude.toFixed(5)}`;$('infoMain').textContent='GPS Active';$('infoSub').innerHTML=`Accuracy ${Math.round(c.accuracy)}m<br>Heading ${Math.round(heading)}°`;sig(c.accuracy);let off=dist({lat:c.latitude,lon:c.longitude},A,B);$('swathVal').textContent=isFinite(off)?Math.round(off/width):'0';led(off)},err=>{$('infoMain').textContent='GPS Error';$('infoSub').textContent=err.message;sig(999)},{enableHighAccuracy:true,maximumAge:1000,timeout:15000})}
function widthPrompt(){let v=prompt('Boom width in metres',width);if(v&&+v>0){width=+v;$('widthVal').textContent=width.toFixed(1)+'m'}}
$('startBtn').onclick=startGPS;$('stopBtn').onclick=stopGPS;$('setA').onclick=()=>{if(last){A={...last};alert('Point A set')}else alert('Start GPS first')};$('setB').onclick=()=>{if(last){B={...last};alert('Point B set')}else alert('Start GPS first')};$('menuBtn').onclick=()=>$('app').classList.toggle('menuOpen');$('closeBtn').onclick=()=>$('app').classList.remove('menuOpen');$('settingsBtn').onclick=widthPrompt;$('centerBtn').onclick=()=>{A=null;B=null;$('swathVal').textContent='0';alert('Line reset')};$('lineBtn').onclick=()=>alert('Use SET A then SET B to make your straight line');$('saveBtn').onclick=()=>alert(last?'Point saved on screen':'Start GPS first');$('viewBtn').onclick=()=>alert('Saved points will be added in the next version');document.addEventListener('visibilitychange',()=>{if(!document.hidden&&watch)awake()});sig(999);led(NaN);
</script>
</body></html>
