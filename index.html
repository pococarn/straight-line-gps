<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>Farm A-B Lightbar</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    color: white;
    font-family: Arial, Helvetica, sans-serif;
    text-align: center;
    -webkit-user-select: none;
    user-select: none;
  }
  #app {
    padding: 10px;
  }
  .status {
    font-size: 20px;
    margin: 6px;
  }
  .offset {
    font-size: 56px;
    font-weight: bold;
    margin-top: 12px;
    min-height: 75px;
  }
  .arrow {
    font-size: 88px;
    font-weight: bold;
    margin: 5px;
    min-height: 100px;
  }
  .small {
    font-size: 22px;
    margin: 6px;
  }
  button {
    font-size: 22px;
    font-weight: bold;
    margin: 5px;
    padding: 14px 16px;
    border-radius: 10px;
    border: 0;
  }
  .green { color: #00ff00; }
  .yellow { color: #ffff00; }
  .red { color: #ff3333; }
  .row {
    margin-top: 8px;
  }
  .wide {
    width: 44%;
  }
  .full {
    width: 92%;
  }
</style>
</head>
<body>
<div id="app">
  <div id="gpsStatus" class="status red">GPS: WAITING</div>

  <div id="offset" class="offset">SET A POINT</div>
  <div id="arrow" class="arrow">--</div>

  <div id="speed" class="small">Speed: 0.0 km/h</div>
  <div id="width" class="small">Width: 8.0 m | Swath: 0 | Nudge: 0.0 m</div>
  <div id="coords" class="small">Lat/Lon: --</div>

  <div class="row">
    <button class="wide" onclick="setA()">SET A</button>
    <button class="wide" onclick="setB()">SET B</button>
  </div>

  <div class="row">
    <button class="wide" onclick="nudgeLeft()">NUDGE ←</button>
    <button class="wide" onclick="nudgeRight()">NUDGE →</button>
  </div>

  <div class="row">
    <button class="wide" onclick="widthMinus()">WIDTH -</button>
    <button class="wide" onclick="widthPlus()">WIDTH +</button>
  </div>

  <div class="row">
    <button class="full" onclick="clearLine()">CLEAR A-B LINE</button>
  </div>

  <div class="row">
    <button class="full" onclick="startGps()">START GPS</button>
  </div>
</div>

<script>
var current = null;
var pointA = null;
var pointB = null;

var implementWidth = 8.0;
var nudge = 0.0;
var speedKmh = 0.0;
var lastPositionTime = null;

var R = 6378137.0;

function $(id) {
  return document.getElementById(id);
}

function degToRad(d) {
  return d * Math.PI / 180.0;
}

function latLonToLocalMetres(origin, p) {
  var lat0 = degToRad(origin.lat);
  var dLat = degToRad(p.lat - origin.lat);
  var dLon = degToRad(p.lon - origin.lon);

  return {
    x: dLon * Math.cos(lat0) * R,
    y: dLat * R
  };
}

function calculateGuidance() {
  if (!current) {
    $("offset").innerHTML = "NO GPS";
    $("arrow").innerHTML = "--";
    return;
  }

  if (!pointA) {
    $("offset").innerHTML = "SET A POINT";
    $("arrow").innerHTML = "--";
    return;
  }

  if (!pointB) {
    $("offset").innerHTML = "DRIVE, THEN SET B";
    $("arrow").innerHTML = "--";
    return;
  }

  var b = latLonToLocalMetres(pointA, pointB);
  var p = latLonToLocalMetres(pointA, current);

  var len = Math.sqrt(b.x * b.x + b.y * b.y);
  if (len < 2.0) {
    $("offset").innerHTML = "BAD A-B LINE";
    $("arrow").innerHTML = "--";
    return;
  }

  var ux = b.x / len;
  var uy = b.y / len;

  // Cross-track distance from A-B line in metres.
  var cross = p.x * (-uy) + p.y * ux;
  cross += nudge;

  var swath = Math.round(cross / implementWidth);
  var target = swath * implementWidth;
  var error = cross - target;
  var absErr = Math.abs(error);

  $("width").innerHTML =
    "Width: " + implementWidth.toFixed(1) +
    " m | Swath: " + swath +
    " | Nudge: " + nudge.toFixed(1) + " m";

  $("offset").className = "offset";
  $("arrow").className = "arrow";

  if (absErr < 0.25) {
    $("offset").innerHTML = "ON LINE";
    $("arrow").innerHTML = "||";
    $("offset").className = "offset green";
    $("arrow").className = "arrow green";
  } else if (error < 0) {
    $("offset").innerHTML = absErr.toFixed(1) + " m LEFT";
    $("arrow").innerHTML = "← ← ←";
    $("offset").className = "offset yellow";
    $("arrow").className = "arrow yellow";
  } else {
    $("offset").innerHTML = absErr.toFixed(1) + " m RIGHT";
    $("arrow").innerHTML = "→ → →";
    $("offset").className = "offset yellow";
    $("arrow").className = "arrow yellow";
  }
}

function setA() {
  if (!current) {
    alert("No GPS position yet.");
    return;
  }
  pointA = { lat: current.lat, lon: current.lon };
  pointB = null;
  $("offset").innerHTML = "A SET";
  $("arrow").innerHTML = "DRIVE";
}

function setB() {
  if (!current || !pointA) {
    alert("Set A first, then drive forward and set B.");
    return;
  }
  pointB = { lat: current.lat, lon: current.lon };
  calculateGuidance();
}

function clearLine() {
  pointA = null;
  pointB = null;
  nudge = 0.0;
  calculateGuidance();
}

function nudgeLeft() {
  nudge -= 0.5;
  calculateGuidance();
}

function nudgeRight() {
  nudge += 0.5;
  calculateGuidance();
}

function widthMinus() {
  implementWidth -= 0.5;
  if (implementWidth < 1.0) implementWidth = 1.0;
  calculateGuidance();
}

function widthPlus() {
  implementWidth += 0.5;
  calculateGuidance();
}

function startGps() {
  if (!navigator.geolocation) {
    alert("This browser does not support GPS/geolocation.");
    return;
  }

  $("gpsStatus").innerHTML = "GPS: STARTING";
  $("gpsStatus").className = "status yellow";

  navigator.geolocation.watchPosition(
    function(pos) {
      var lat = pos.coords.latitude;
      var lon = pos.coords.longitude;
      var accuracy = pos.coords.accuracy;
      var spd = pos.coords.speed;

      current = { lat: lat, lon: lon };

      if (spd !== null && !isNaN(spd)) {
        speedKmh = spd * 3.6;
      }

      $("gpsStatus").innerHTML = "GPS: FIX OK | Accuracy: " + accuracy.toFixed(1) + " m";
      $("gpsStatus").className = accuracy <= 10 ? "status green" : "status yellow";
      $("speed").innerHTML = "Speed: " + speedKmh.toFixed(1) + " km/h";
      $("coords").innerHTML = "Lat/Lon: " + lat.toFixed(6) + ", " + lon.toFixed(6);

      calculateGuidance();
    },
    function(err) {
      $("gpsStatus").innerHTML = "GPS ERROR: " + err.message;
      $("gpsStatus").className = "status red";
    },
    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }
  );
}

calculateGuidance();
</script>
</body>
</html>
